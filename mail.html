
<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiljUI Mail – Login</title>
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- TOP FROSTED BAR -->
<header class="topbar glaspanel">
  <div class="logo">
    <div class="dot"></div>
    <span>LiljUI Mail</span>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar glaspanel">
  <h2>Inkorgar</h2>
  <nav>
    <a>Inkorg</a>
    <a>Skickat</a>
    <a>Skräp</a>
    <a>Papperskorg</a>
  </nav>
</aside>

<!-- LOGIN BOX -->
<main class="login-wrapper glaspanel">
  <h1>Logga in till LiljUI Mail</h1>

  <form class="login-form" action="mail.html">
    <label>Användarnamn</label>
    <input type="text" placeholder="namn@liljui.se" required>

    <label>Lösenord</label>
    <input type="password" placeholder="••••••••" required>

    <button type="submit">Logga in</button>
  </form>

  <p class="info">
    Detta är en UI‑version.  
    För riktig mail: <a href="https://mail.loopia.se" target="_blank">Loopia Webmail</a>
  </p>
</main>

</body>
</html>
